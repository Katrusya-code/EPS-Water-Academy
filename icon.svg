<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: light blue → cream, matches homepage -->
    <radialGradient id="bg" cx="0.5" cy="0.35" r="0.85">
      <stop offset="0%" stop-color="#eaf3f9"/>
      <stop offset="60%" stop-color="#d4e7f2"/>
      <stop offset="100%" stop-color="#b8d4e3"/>
    </radialGradient>

    <!-- Drop body: deep blue → teal → green (mirrors the H1 gradient) -->
    <linearGradient id="drop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#4ec3ff"/>
      <stop offset="50%"  stop-color="#40d4c4"/>
      <stop offset="100%" stop-color="#1e8449"/>
    </linearGradient>

    <!-- Soft inner shading for depth -->
    <radialGradient id="dropShade" cx="0.5" cy="0.35" r="0.7">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip the wave to the inside of the drop -->
    <clipPath id="dropClip">
      <path d="M256 64
               C 220 130, 156 200, 144 280
               C 132 360, 184 432, 256 432
               C 328 432, 380 360, 368 280
               C 356 200, 292 130, 256 64 Z"/>
    </clipPath>
  </defs>

  <!-- Rounded-square background (iOS will mask, Android adaptive will mask further; safe zone = central 80%) -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle bubble decorations (won't survive iOS masking but visible elsewhere) -->
  <circle cx="86"  cy="98"  r="14" fill="#ffffff" opacity="0.55"/>
  <circle cx="430" cy="120" r="9"  fill="#ffffff" opacity="0.45"/>
  <circle cx="64"  cy="420" r="11" fill="#ffffff" opacity="0.4"/>
  <circle cx="450" cy="400" r="16" fill="#ffffff" opacity="0.5"/>

  <!-- Main water drop -->
  <g>
    <path d="M256 64
             C 220 130, 156 200, 144 280
             C 132 360, 184 432, 256 432
             C 328 432, 380 360, 368 280
             C 356 200, 292 130, 256 64 Z"
          fill="url(#drop)"/>

    <!-- Wave inside the drop -->
    <g clip-path="url(#dropClip)">
      <path d="M120 320
               Q 168 290, 216 320
               T 312 320
               T 408 320
               L 408 460
               L 120 460 Z"
            fill="#ffffff" opacity="0.30"/>
      <path d="M120 348
               Q 168 318, 216 348
               T 312 348
               T 408 348
               L 408 460
               L 120 460 Z"
            fill="#ffffff" opacity="0.25"/>
    </g>

    <!-- Highlight to give the drop a sense of volume -->
    <path d="M256 64
             C 220 130, 156 200, 144 280
             C 132 360, 184 432, 256 432
             C 328 432, 380 360, 368 280
             C 356 200, 292 130, 256 64 Z"
          fill="url(#dropShade)"/>

    <!-- Glint highlight -->
    <ellipse cx="218" cy="200" rx="22" ry="46" fill="#ffffff" opacity="0.55" transform="rotate(-18 218 200)"/>
  </g>
</svg>
